_target_: docvqa.solvers.official_baseline_solver.create_official_baseline_program
vlm: ${vlm}
question_concurrency: 4
# null = send all pages, matching the kit's published Gemini/GPT
# baselines. The kit's stated policy is "if a sample fails because
# input is too large, it counts as a failure" (README §Results).
# On Qwen 27B (131k context) this causes ~45/80 BadRequestErrors on
# val long docs that get scored as 'Unknown' — that IS the kit's
# expected behaviour for a model with this context budget.
max_pages: null
