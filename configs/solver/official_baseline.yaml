# Test split docs are longer than val on average; the strict kit-
# faithful setting (max_pages=null) produced 160/160 context-overflow
# failures on test t2 - zero signal. We pivoted to 10-page truncation
# for the test runs to get a useful number. The val runs at
# max_pages=null are preserved as the kit-faithful interpretation
# (21.67% +/- 1.91pp, n=3); test runs use max_pages=10 below.
# See `docs/experiments/official-baseline-qwen27b.md` for the rationale.
max_pages: 10
