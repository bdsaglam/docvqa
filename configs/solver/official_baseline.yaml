_target_: docvqa.solvers.official_baseline_solver.create_official_baseline_program
vlm: ${vlm}
question_concurrency: 4
# Test docs have individual pages up to 246M pixels (maps_5 p0).
# Even max_pages=10 at native resolution overflows Qwen's 131k
# context on test - 160/160 errors on t1. The kit's published
# Gemini/GPT baselines implicitly downscale via their image APIs;
# Qwen vLLM does not. We downscale per page here to 1.5M pixels
# (~1200x1250) which is comparable to what closed-frontier image
# APIs target, AND truncate to first 10 pages.
# Val kit-faithful results (max_pages=null, no downscale) are
# preserved as the strict-kit interpretation: 21.67% +/- 1.91pp, n=3.
max_pages: 10
max_image_pixels: 1500000
