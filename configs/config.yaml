defaults:
  - lm: qwen-3_5-27b-vllm-local
  - solver: flat_solo
  - vlm: qwen-3_5-27b-vllm-local
  - _self_

# Data settings
data:
  dataset: VLR-CVC/DocVQA-2026
  split: val
  num_samples: 5
  doc_ids: null
  doc_ids_file: null
  categories: null
  # When true, the runner uses the dataset profile's score_fn instead
  # of the ANLS-based default (e.g. Qwen judge for MMLongBench-Doc).
  use_profile_scoring: false

# Run settings
run_id: null
max_concurrency: 1
task_timeout_seconds: 14400

# Hydra settings
hydra:
  run:
    dir: output/runs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
